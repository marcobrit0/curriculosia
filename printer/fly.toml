app = "curriculosia-printer"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  CONNECTION_TIMEOUT = "60000"
  MAX_CONCURRENT_SESSIONS = "5"
  TOKEN = "change-me-to-a-secure-token"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 3000
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/json/version"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
